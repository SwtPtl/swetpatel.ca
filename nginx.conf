# /etc/nginx/sites-available/swetpatel.ca
# Symlink to /etc/nginx/sites-enabled/ then: sudo nginx -t && sudo systemctl reload nginx
# SSL params filled by Certbot — run: sudo certbot --nginx -d swetpatel.ca -d www.swetpatel.ca -d php.swetpatel.ca

# ─── React SPA ──────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name swetpatel.ca www.swetpatel.ca;
    return 301 https://swetpatel.ca$request_uri;
}

server {
    listen 443 ssl http2;
    server_name www.swetpatel.ca;
    return 301 https://swetpatel.ca$request_uri;

    # Certbot managed
    ssl_certificate     /etc/letsencrypt/live/swetpatel.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swetpatel.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;
}

server {
    listen 443 ssl http2;
    server_name swetpatel.ca;

    # Certbot managed
    ssl_certificate     /etc/letsencrypt/live/swetpatel.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swetpatel.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root /var/www/react/dist;
    index index.html;

    # Shared assets (logo, favicon)
    location /shared/ {
        alias /var/www/shared/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    # React SPA fallback
    location / {
        try_files $uri $uri/ /index.html;
    }

    # Hashed static assets — long cache
    location ~* \.(js|css|woff2|woff|ttf)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # Favicon / SVG — shorter cache
    location ~* \.(svg|ico|png)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    # Security headers
    add_header X-Frame-Options "SAMEORIGIN"         always;
    add_header X-Content-Type-Options "nosniff"     always;
    add_header Referrer-Policy "strict-origin"      always;
    add_header X-XSS-Protection "1; mode=block"    always;

    gzip on;
    gzip_types text/plain text/css application/javascript application/json image/svg+xml;
    gzip_min_length 1024;
}

# ─── PHP Site ────────────────────────────────────────────────────────────────
server {
    listen 80;
    server_name php.swetpatel.ca;
    return 301 https://php.swetpatel.ca$request_uri;
}

server {
    listen 443 ssl http2;
    server_name php.swetpatel.ca;

    # Certbot managed (can share cert via SAN or use separate)
    ssl_certificate     /etc/letsencrypt/live/swetpatel.ca/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/swetpatel.ca/privkey.pem;
    include             /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    root  /var/www/php;
    index index.php;

    # Shared assets (logo, favicon) via symlink /var/www/php/shared → /var/www/shared
    location /shared/ {
        alias /var/www/shared/;
        expires 30d;
        add_header Cache-Control "public, immutable";
    }

    location / {
        try_files $uri $uri/ =404;
    }

    location ~ \.php$ {
        include        fastcgi_params;
        fastcgi_pass   unix:/run/php/php8.3-fpm.sock;
        fastcgi_index  index.php;
        fastcgi_param  SCRIPT_FILENAME $document_root$fastcgi_script_name;
    }

    # Deny access to PHP component files directly
    location ~ ^/components/ {
        deny all;
        return 404;
    }

    location ~* \.(css|js|svg|ico|png|woff2)$ {
        expires 7d;
        add_header Cache-Control "public";
    }

    add_header X-Frame-Options "SAMEORIGIN"      always;
    add_header X-Content-Type-Options "nosniff"  always;
    add_header Referrer-Policy "strict-origin"   always;

    gzip on;
    gzip_types text/plain text/css application/javascript image/svg+xml;
    gzip_min_length 1024;
}
